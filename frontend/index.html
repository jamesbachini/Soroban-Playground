<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SoroPG.com</title>
    <!-- <script src="bundles/stellar-sdk.min.js"></script> -->
    <script src="https://cdn.jsdelivr.net/npm/@stellar/stellar-sdk@16.0.1/dist/stellar-sdk.min.js"></script>
    <script src="bundles/wallet-kit-bundle.umd.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="./style/style.css?v=0.8.1" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-QRG8JX7138"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-QRG8JX7138');
    </script>
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="sidebar-icon" data-panel="home" title="Home">
          <img src="./soroban.svg" alt="Soroban" class="logo" />
        </div>
        <div class="sidebar-icon active" data-panel="create" title="Create">
          <div><i class="fas fa-file-code fa-lg"></i></div>
          <div class="sidebar-label">CREATE</div>
        </div>
        <div class="sidebar-icon" data-panel="test" title="Test">
          <div><i class="fas fa-vial fa-lg"></i></div>
          <div class="sidebar-label">TEST</div>
        </div>
        <div class="sidebar-icon" data-panel="build" title="Build">
          <div><i class="fas fa-hammer fa-lg"></i></div>
          <div class="sidebar-label">BUILD</div>
        </div>
        <div class="sidebar-icon" data-panel="deploy" title="Deploy">
          <div><i class="fas fa-rocket fa-lg"></i></div>
          <div class="sidebar-label">DEPLOY</div>
        </div>
        <div class="sidebar-icon" data-panel="explore" title="Explore" id="explore-sidebar-icon">
          <div><i class="fas fa-flask fa-lg"></i></div>
          <div class="sidebar-label">EXPLORE</div>
        </div>
        <div class="sidebar-bottom">
          <div class="sidebar-icon ai-icon" data-panel="ai" title="AI">
            <div><i class="fas fa-wand-magic-sparkles fa-lg"></i></div>
            <div class="sidebar-label">AI</div>
          </div>
          <div class="sidebar-icon" data-panel="academy" title="ACADEMY">
            <div><i class="fas fa-graduation-cap fa-lg"></i></div>
            <div class="sidebar-label">ACADEMY</div>
          </div>
          <div class="sidebar-icon docs-icon" data-panel="docs" title="DOCS">
            <div><i class="fas fa-book fa-lg"></i></div>
            <div class="sidebar-label">DOCS</div>
          </div>
          <div class="sidebar-icon settings-icon" data-panel="settings" title="SETTINGS">
            <div><i class="fas fa-cog fa-lg"></i></div>
            <div class="sidebar-label">SETTINGS</div>
          </div>
          <div class="sidebar-icon github-icon" data-panel="github" title="GITHUB">
            <div><i class="fa-brands fa-github fa-lg"></i></div>
            <div class="sidebar-label">GITHUB</div>
          </div>
        </div>
      </div>

      <div id="main-content">
        <div id="editor-container">
          <div id="editor-tabs-container">
            <div id="editor-tabs">
              <div class="add-tab-button" id="add-tab" title="Add new file">+</div>
            </div>
            <div id="header-menu">
              <a href="https://lab.stellar.org/" target="_blank">LAB</a>
              <a href="https://stellar.expert/" target="_blank">EXPLORER</a>
              <a href="https://jamesbachini.github.io/Soroban-Dev-Tools/" target="_blank">TOOLS</a>
              <a href="https://developers.stellar.org/" target="_blank">DOCS</a>
              <span class="menu-separator">-</span>
              <button id="theme-toggle" class="theme-toggle" type="button" title="Switch to light mode" aria-label="Switch to light mode" aria-pressed="false">
                <i class="fa-solid fa-sun" aria-hidden="true"></i>
              </button>
              <a href="https://soropg.com" target="_blank" class="header-brand-link"><span class="accent-solid brand-name">SoroPG.com</span> <span class="version-text">v0.8.1</span></a>
            </div>
          </div>
          <div id="editor"></div>
          <button id="editor-ai-shortcut" class="editor-ai-shortcut" type="button" title="Open AI Assistant" aria-label="Open AI Assistant">
            <i class="fas fa-wand-magic-sparkles"></i>
          </button>
          <div id="academy-main-slot"></div>
        </div>
        <div id="resizer">
          <button id="panel-collapse" type="button" title="Hide panel" aria-label="Hide panel">&#x2716;</button>
        </div>
        <div id="panel-container">
          <div id="panel-loading" class="panel-loading">Loading workspace...</div>
        </div> <!-- end panel-container -->
        <button id="panel-expand" type="button" title="Show panel" aria-label="Show panel">+</button>
      </div> <!-- end main-content -->
    </div> <!-- end container -->

    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script type="module" src="./js/main.js?v=0.8.1"></script>
  </body>
</html>

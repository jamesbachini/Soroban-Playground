<div class="panel" id="explore-panel">
            <h1><i class="fas fa-flask accent"></i> Contract Explorer</h1>
            <div class="panel-content">
              <div class="info-card">
                <p>In this section you can explore and call Stellar contract functions using your web browser</p>
              </div>
              <div class="explore-controls">
                <div class="wallet-toolbar" data-context="explore">
                  <div class="wallet-toolbar-row">
                    <div class="wallet-icon" aria-hidden="true">
                      <i class="fas fa-wallet"></i>
                    </div>
                    <button type="button" class="wallet-generate">Generate Wallet</button>
                    <div id="wallet-button-explore" class="wallet-connect"></div>
                    <div class="wallet-menu">
                      <button type="button" class="wallet-menu-toggle" aria-haspopup="true" aria-expanded="false" title="Wallet options">
                        <i class="fas fa-ellipsis-h"></i>
                      </button>
                      <div class="wallet-menu-panel" role="menu">
                        <button type="button" class="wallet-menu-item wallet-load-secret" role="menuitem">Import Keys</button>
                        <button type="button" class="wallet-menu-item wallet-export-keys" role="menuitem">Export Keys</button>
                        <button type="button" class="wallet-menu-item wallet-fund" role="menuitem">Fund Wallet</button>
                        <button type="button" class="wallet-menu-item wallet-disconnect" role="menuitem">Disconnect</button>
                      </div>
                    </div>
                  </div>
                  <div class="wallet-status">
                    <span class="wallet-status-text"></span>
                    <span class="wallet-status-address"></span>
                    <div class="wallet-funding-status"></div>
                    <div class="wallet-keys"></div>
                  </div>
                </div>
                <br />
                <label for="explore-network">Network: </label>
                <select id="explore-network">
                  <option value="TESTNET" selected>Testnet</option>
                  <option value="LOCAL">Local</option>
                  <option value="FUTURENET">Futurenet</option>
                  <option value="PUBLIC">Mainnet</option>
                </select>
              </div>
              <div>
                <input type="text" id="explore-contract-id" placeholder="Contract ID" />
                <button type="button" id="load-contract-button">Load</button>
              </div>
              <div id="explore-form">

              </div>
            </div>
          </div>
